<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon | Fale Conosco</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --terra: #C4773B;
    --ink: #1C1915;
    --white: #FDFAF5;
    --beige: #E8DED2;
    --brown: #3A2B22;
    --gray: #B8ADA3;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--ink);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container {
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  .logo-symbol {
    margin: 0 auto 1.5rem;
    width: 70px;
  }

  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 400;
    color: var(--white);
    letter-spacing: -1px;
    margin-bottom: 0.4rem;
  }

  .tagline {
    font-size: 0.7rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--terra);
    font-weight: 500;
    margin-bottom: 2.5rem;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: rgba(196,119,59,0.4);
    margin: 0 auto 2.5rem;
  }

  .desc {
    font-size: 0.9rem;
    color: var(--gray);
    line-height: 1.8;
    font-weight: 300;
    margin-bottom: 2.5rem;
    max-width: 340px;
    margin-left: auto;
    margin-right: auto;
  }

  .desc em {
    color: var(--white);
    font-style: normal;
    font-weight: 400;
  }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 1rem 1.5rem;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-primary {
    background: var(--terra);
    color: var(--white);
  }

  .btn-primary:hover {
    background: #b36930;
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: transparent;
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.12);
  }

  .btn-secondary:hover {
    border-color: rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.04);
  }

  .btn-icon {
    width: 20px;
    height: 20px;
    opacity: 0.85;
  }

  .footer-line {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin-bottom: 1.5rem;
  }

  .footer {
    font-size: 0.72rem;
    color: rgba(184,173,163,0.4);
    letter-spacing: 1px;
  }

  .location {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 0.75rem;
    color: rgba(184,173,163,0.5);
    margin-bottom: 2.5rem;
  }

  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--terra);
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="container">

      <circle cx="35" cy="36" r="18" fill="#C4773B"/>

  <div class="location">
    <div class="dot"></div>
    <span>Cascavel, PR · Brasil</span>
    <div class="dot"></div>
  </div>

  <div class="footer-line"></div>
  <div class="footer">© 2026 Horizon · Soluções Digitais com IA</div>

</div>

</body>
</html>
